# Filter: Parse syslog events forwarded by Filebeat
filter {
  if [fileset][module] == "system" {
    if [fileset][name] == "syslog" {
      grok {
        match => {
          "message" => [
            "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{DATA:syslog_program}(?:\[%{POSINT:syslog_pid}\])?: %{GREEDYDATA:syslog_message}",
            "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:syslog_hostname} %{GREEDYDATA:syslog_message}"
          ]
        }
        remove_field => ["message"]
      }
      date {
        match => ["syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss"]
        target => "@timestamp"
      }
    }
  }

  if [fileset][module] == "nginx" {
    if [fileset][name] == "access" {
      grok {
        match => {
          "message" => '%{IPORHOST:remote_ip} - %{DATA:user_name} \[%{HTTPDATE:time}\] "%{WORD:request_method} %{DATA:request} HTTP/%{NUMBER:http_version}" %{NUMBER:response_code} %{NUMBER:bytes} "%{DATA:referrer}" "%{DATA:user_agent}"'
        }
        remove_field => ["message"]
      }
      mutate {
        convert => { "response_code" => "integer" }
        convert => { "bytes"         => "integer" }
      }
    }
  }

  # Geo-enrich any remote_ip field
  if [remote_ip] {
    geoip {
      source => "remote_ip"
      target => "geoip"
    }
  }

  # Drop noisy health-check requests
  if [request] =~ /health/ {
    drop {}
  }
}
